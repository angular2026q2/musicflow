<header class="header">
  <div class="header__search">
    <p-iconfield>
      <p-inputicon class="pi pi-search"></p-inputicon>
      <input
        pInputText
        pSize="small"
        type="text"
        placeholder="Search artists, songs..."
        name="SearchBar"
        class="header__search-input"
      />
    </p-iconfield>
  </div>

  <div class="header__actions">
    <app-control-button class="header__actions-btn" icon="bell" ariaLabel="Notifications" />


    <a [routerLink]="APP_ROUTES.SETTINGS.route" class="header__actions-btn" aria-label="Settings">
      <svg [lucideIcon]="ICONS.settings.icon" [size]="20"></svg>
    </a>

    <p-icon-field>
      <a
        [routerLink]="APP_ROUTES.PROFILE.route"
        class="header__actions-btn"
        aria-label="User profile"
      >
        @if (avatarUrl()) {
          <p-avatar [image]="avatarUrl()" size="normal" shape="circle" />
        } @else {
          <p-avatar icon="pi pi-user" size="normal" shape="circle" />
        }
      </a>
    </p-icon-field>
  </div>
</header>
