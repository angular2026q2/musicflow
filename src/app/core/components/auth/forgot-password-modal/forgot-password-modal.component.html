<div class="forgot-password-modal">
  <app-control-button
    class="forgot-password-modal__close"
    icon="close"
    (click)="close()"
  />

  <div class="forgot-password-modal__header">
    <h2 class="forgot-password-modal__title">Music FLow</h2>
    <h3 class="forgot-password-modal__heading">Reset Password</h3>
    <p class="forgot-password-modal__subtitle">Enter your email and we'll send you reset instructions.</p>
  </div>

  <form
    class="forgot-password-modal__form"
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
  >
    <app-form-field
      label="EMAIL ADDRESS"
      inputId="email"
      icon="mail"
      type="email"
      placeholder="name@musicflow.com"
      autocomplete="email"
      [control]="form.controls.email"
      errorMessage="Enter a valid email address"
    />

    <app-submit-button
      label="Request Reset Link"
      [isLoading]="isLoading()"
      [disabled]="form.invalid || isLoading()"
    />
  </form>

  <div class="forgot-password-modal__footer">
    <p class="forgot-password-modal__switch">
      Remember your password?
      <button
        type="button"
        class="forgot-password-modal__link"
        (click)="switchTo('sign-in')"
      >
        Sign In
      </button>
    </p>
  </div>
</div>
