<p-card class="small-card">
  <div class="small-card__content">
    <div class="small-card__icon-wrapper" [style.background-color]="iconBackgroundColor()">
      <svg
        [lucideIcon]="config().icon"
        size="30"
        color="iconColor()"
        [attr.fill]="iconColor()"
      ></svg>
    </div>

    <h4 class="small-card__title">{{ title() }}</h4>
    <p class="small-card__description">{{ description() }}</p>
  </div>
</p-card>
