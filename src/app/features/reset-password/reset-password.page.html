<div class="reset-password">
  <div class="reset-password__card">
    <div class="reset-password__header">
      <h2 class="reset-password__title">Music Flow</h2>
      <h3 class="reset-password__heading">Set New Password</h3>
      <p class="reset-password__subtitle">Enter and confirm your new password</p>
    </div>

    <form class="reset-password__form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="reset-password__field">
        <label for="password" class="reset-password__label">NEW PASSWORD</label>
        <div class="reset-password__password-wrapper form-field--fluid">
          <svg [lucideIcon]="ICONS.lock.icon" [size]="16" class="lock-icon"></svg>
          <p-password
            formControlName="password"
            inputId="password"
            [toggleMask]="true"
            [feedback]="true"
            placeholder="••••••"
            autocomplete="new-password"
          />
        </div>
        <span class="reset-password__error-text">
          @if (form.controls.password.invalid && form.controls.password.touched) {
            Password must be at least 6 characters
          }
        </span>

        <div class="reset-password__field">
          <label for="confirmPassword" class="reset-password__label">CONFIRM PASSWORD</label>
          <div class="reset-password__password-wrapper form-field--fluid">
            <svg [lucideIcon]="ICONS.lock.icon" [size]="16" class="lock-icon"></svg>
            <p-password
              formControlName="confirmPassword"
              inputId="confirmPassword"
              [toggleMask]="true"
              [feedback]="false"
              placeholder="••••••"
              autocomplete="new-password"
            />
          </div>
          <span class="reset-password__error-text">
            @if (form.controls.confirmPassword.touched && form.hasError('passwordMismatch')) {
              Passwords do not match
            }
          </span>
        </div>
      </div>

      <app-submit-button
        label="Update Password"
        [isLoading]="isLoading()"
        [disabled]="form.invalid || isLoading()"
      />
    </form>
  </div>
</div>
