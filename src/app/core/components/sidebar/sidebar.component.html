<aside class="sidebar">
  <div class="sidebar__logo">
    <span class="sidebar__logo-title">{{ title | titlecase }}</span>
    <span class="sidebar__logo-subtitle">{{ subtitle | titlecase }}</span>
  </div>

  <nav class="sidebar__nav">
    @for (item of mainNavItems; track item.route) {
      <app-nav-item [item]="item" />
    }

    @let contextItems = contextNavItems();
    @if (contextItems.length > 0) {
      <p-divider class="sidebar__divider" />
      @for (item of contextItems; track item.route) {
        <app-nav-item [item]="item" />
      }
    }
  </nav>

  <div class="sidebar__footer">
    <p-divider />
    <a
      [routerLink]="aboutTeamNavItem.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="sidebar__footer-link"
      >{{ aboutTeamNavItem.label }}</a
    >
  </div>
</aside>
