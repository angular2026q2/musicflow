<section class="home-page">
  <div class="home-page__recently-played">
    @if (recentTracksLoading()) {
      <div class="home-page__recently-played__skeleton">
        <p-skeleton width="10rem" class="mb-2" />
        <p-skeleton height="5rem" class="mb-2" />
        <p-skeleton height="5rem" class="mb-2" />
        <p-skeleton height="5rem" class="mb-2" />
      </div>
    } @else if (recentTracksError(); as error) {
      <p-message severity="error">
        {{ error }}
      </p-message>
    } @else {
      <app-recently-played [tracks]="recentTracks()" />
    }
  </div>
</section>
