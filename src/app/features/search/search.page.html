<div class="search">
  <h2 class="search__title">
    Results for <span class="search__title-query">{{ query() }} </span>
  </h2>
  <div class="card flex justify-center">
    <p-slider
      [ngModel]="maxDurationModel"
      (ngModelChange)="setMaxDuration($event)"
      [min]="0"
      [max]="maxDuration()"
    />
  </div>
  <div class="card flex justify-center">
    <p-select
      [options]="sortOptions"
      optionLabel="label"
      optionValue="value"
      [ngModel]="sortBy()"
      (ngModelChange)="setSort($event)"
      placeholder="Sort by ..."
    />
  </div>

  <div class="card flex justify-center">
    <p-selectbutton
      [options]="genres()"
      [ngModel]="selectedGenres()"
      [multiple]="true"
      (ngModelChange)="onGenresChange($event)"
    />
  </div>
  <div class="search__items">
    @for (track of tracks(); track track.id) {
      <div class="search__items-card">
        <div class="track-card__details">
          <app-item-details
            [imageUrl]="track.album_image"
            [title]="track.name"
            [primaryDesc]="track.artist_name"
            [imageVariant]="'square'"
            [titleVariant]="'normal'"
          ></app-item-details>
        </div>
        <div class="track-card__meta">
          <app-track-duration [trackDuration]="track.duration"></app-track-duration>
        </div>
      </div>
    }
  </div>

  @if (hasMoreTracks()) {
    <app-submit-button [label]="'Load more'" (click)="loadMore()"></app-submit-button>
  }
</div>
