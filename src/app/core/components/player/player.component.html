<section class="player">
  <div class="player__bar" [class.player__bar--active]="isActive()">
    <div class="player__wrapper">
      <div class="player__info">
        <div class="player__info-card">
          <div class="player__cover-container">
            <img src="/images/track-cover.webp" alt="Track cover" class="player__cover" />
          </div>
          <div class="player__description">
            <app-meta [title]="title()" [primaryDesc]="primaryDesc()"></app-meta>
          </div>
        </div>
      </div>

      <div class="player__controls-bar">
        <app-control-button icon="heart" [active]="isFavorite()" (click)="toggleFavorite()" />
        <app-controls-bar
          [isPlaying]="isActive()"
          [isShuffle]="isShuffle()"
          [repeatMode]="repeatMode()"
          (playToggle)="onPlayToggle()"
          (prev)="onPrev()"
          (next)="onNext()"
          (shuffleToggle)="onShuffleToggle()"
          (repeatToggle)="onRepeatToggle()"
        ></app-controls-bar>
      </div>

      <div class="player__meta">
        <app-volume></app-volume>
      </div>
    </div>
  </div>
</section>
