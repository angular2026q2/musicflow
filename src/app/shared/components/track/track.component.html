<div class="track">
  <div class="track__position">
    <span class="track__num">{{ position() }}</span>
    <button
      class="track__play-btn"
      type="button"
      [attr.aria-label]="`Play ${track().name}`"
    >
      <svg [lucideIcon]="ICONS.play.icon" [size]="16"></svg>
    </button>
  </div>

  @if (showImage()) {
    <img
      [ngSrc]="track().album_image"
      alt="{{ track().name }} image"
      class="track__image"
      width="2.5rem"
      height="2.5rem"
    />
  }

  <div class="track__info">
    <span class="track__name">{{ track().name }}</span>
    <a
      [routerLink]="artistLink(track().artist_id)"
      class="track__artist"
    >
      {{ track().artist_name }}
    </a>
  </div>

  <span class="track__plays">
    <!-- todo: заменить на реальное значение plays когда API начнёт отдавать это поле -->
    –
  </span>

  <span class="track__duration">
    {{ track().duration | duration }}
  </span>
</div>
