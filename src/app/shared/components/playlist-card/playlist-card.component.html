@let playlist = data();

<div
  class="playlist-card"
  tabindex="0"
  (click)="cardClick.emit(playlist.id)"
  (keydown.enter)="cardClick.emit(playlist.id)"
>
  <div class="playlist-card__header">
    <div class="playlist-card__title">
      {{ playlist.name }}
    </div>

    <app-dropdown-menu
      [items]="dropdownList"
      (click)="$event.stopPropagation()"
    ></app-dropdown-menu>
  </div>
  <div class="playlist-card__meta">
    <div class="playlist-card__track-count">
      @let count = playlist.tracks.length;

      {{ count }} {{ count === 1 ? 'track' : 'tracks' }}
    </div>

    <span class="playlist-card__meta-dot" aria-hidden="true">•</span>

    @if (playlist.duration !== undefined) {
      <div class="playlist-card__duration">
        {{ playlist.duration | duration: 'total' }}
      </div>
    }
  </div>
</div>
