<section class="catalog">
  <div class="catalog__banner">
    <h2 class="catalog__title">{{ title() }}</h2>
  </div>

  @if (isInitialLoading()) {
    <app-catalog-skeleton></app-catalog-skeleton>
  } @else if (error()) {
    <app-error
      message="Failed to load data. Please try again later."
      (reload)="reload.emit()"
    ></app-error>
  } @else if (items()?.length) {
    <div
      class="catalog__list"
      infiniteScroll
      [infiniteScrollDistance]="2"
      [infiniteScrollThrottle]="150"
      (scrolled)="scrolled.emit()"
      [infiniteScrollContainer]="'.app-layout__main'"
      [fromRoot]="true"
    >
      @for (item of items(); track item.id) {
        <app-catalog-card [data]="item" [route]="route()"></app-catalog-card>
      }
    </div>
  } @else {
    <div class="catalog__empty">
      <p-message severity="secondary">Nothing found</p-message>
    </div>
  }
</section>
