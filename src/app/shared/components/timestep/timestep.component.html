<div class="timestep">
  <span class="timestep__time">{{ formattedCurrentTime() }}</span>

  <p-slider
    [(ngModel)]="currentTime"
    [min]="0"
    [max]="trackDuration()"
    [step]="0.1"
    class="timestep__slider"
    ariaLabel="Timestep"
  />

  <span class="timestep__time">{{ formattedDuration() }}</span>
</div>
