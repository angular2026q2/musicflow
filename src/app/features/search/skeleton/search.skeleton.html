<div class="search-skeleton">
  <p-skeleton width="15rem" height="2rem" borderRadius="8px"></p-skeleton>

  <div class="search-skeleton__genres">
    @for (_ of skeletonGenresItems(); track $index) {
      <p-skeleton width="6rem" height="3rem" borderRadius="32px" />
    }
  </div>

  <div class="search-skeleton__filters">
    @if (!isMobile()) {
      <p-skeleton width="10rem" height="2rem"></p-skeleton>
    } @else {
      <p-skeleton width="100%" height="2rem"></p-skeleton>
    }

    <p-skeleton width="10rem" height="2rem"></p-skeleton>
  </div>
  @for (_ of skeletonGenresItems(); track $index) {
    <div class="search-skeleton__track">
      <p-skeleton width="3rem" height="3rem"></p-skeleton>
      <div class="search-skeleton__track-description">
        <p-skeleton width="12rem" height="1.25rem"></p-skeleton>
        <p-skeleton width="6rem" height="0.75rem"></p-skeleton>
      </div>
      <div class="search-skeleton__track-data">
        <p-skeleton width="1rem" height="0.25rem"></p-skeleton>
        <p-skeleton width="1rem" height="0.25rem"></p-skeleton>
      </div>
    </div>
  }
</div>
