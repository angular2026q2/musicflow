<section class="catalog">
  <div class="catalog__banner">
    <h2 class="catalog__title">{{ title() }}</h2>
  </div>

  @if (isInitialLoading()) {
    <div class="catalog__loading">
      <p-message severity="secondary">Loading ...</p-message>
    </div>
  } @else if (error()) {
    <div class="catalog__error">
      <p-message severity="error">Failed to load. Please try again later.</p-message>
      <p-button
        label="Retry"
        type="text"
        (click)="reload.emit()"
        class="catalog__retry-btn"
        severity="primary"
      >
        <svg [lucideIcon]="retryIcon"></svg>
      </p-button>
    </div>
  } @else if (items()?.length) {
    <div class="catalog__list">
      @for (item of items(); track item.id) {
        <app-catalog-card [data]="item" [route]="route()"></app-catalog-card>
      }
    </div>
    <p-button
      label="Load more"
      [loading]="isLoading()"
      (click)="loadMore.emit()"
      class="catalog__loadmore-btn"
    ></p-button>
  } @else {
    <div class="catalog__empty">
      <p-message severity="secondary">Nothing found</p-message>
    </div>
  }
</section>
